<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibrar Psicanálise | Clínica e Neurociência</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            amarelo: '#FEF217',
                            amarelo_claro: '#FFF580',
                            roxo_apagado: '#775C97',
                            roxo: '#4D3166',
                            lilas: '#A38DC4',
                            azul_claro: '#CEDFE9',
                            bege: '#F4EBE1',
                            branco: '#FFFFFF'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased flex flex-col min-h-screen">
    
    <header class="fixed w-full z-50 transition-all duration-300 border-t-[6px] border-brand-roxo shadow-sm">
        <div class="absolute inset-0 bg-brand-bege/95 backdrop-blur-sm z-0"></div>
        <img src="/static/img/onda_cabecalho.png" alt="" class="absolute inset-0 w-full h-full object-cover opacity-60 z-0 pointer-events-none mix-blend-multiply">
        
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="flex justify-between items-center h-24">
                <div class="flex-shrink-0 flex items-center">
                    <img class="h-60 w-auto" src="/static/img/logo.webp" alt="Equilibrar Psicanálise">
                </div>
                <nav class="hidden md:flex space-x-8 font-now">
                    <a href="#" class="text-brand-roxo hover:text-brand-roxo_apagado transition-colors">Início</a>
                    <a href="#abordagem" class="text-brand-roxo hover:text-brand-roxo_apagado transition-colors">Abordagem</a>
                    <a href="#servicos" class="text-brand-roxo hover:text-brand-roxo_apagado transition-colors">Serviços</a>
                    <a href="#empresas" class="text-brand-roxo hover:text-brand-roxo_apagado transition-colors">Empresas</a>
                    <a href="#sobre" class="text-brand-roxo hover:text-brand-roxo_apagado transition-colors">Sobre Mim</a>
                </nav>
                <div class="hidden md:flex items-center">
                    <a href="https://www.doctoralia.com.br/z/U4Phnv" target="_blank" class="bg-brand-roxo text-white px-6 py-2 rounded-full font-now hover:bg-brand-lilas hover:text-white transition-colors duration-300 shadow">Agende sua sessão</a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-24">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-brand-lilas text-brand-roxo py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-6">
                <div class="mb-4 md:mb-0">
                    <img src="/static/img/logo.webp" alt="Equilibrar Psicanálise" class="h-60 mx-auto md:mx-0">
                </div>
                <div class="font-now text-sm">
                    <p>© 2026 Equilibrar Psicanálise Clínica. Todos os direitos reservados.</p>
                    <p class="mt-2">Equilibrando Mente e Emoções através da Psicanálise e Neurociência.</p>
                </div>
                <div class="flex gap-4 text-sm mt-4 md:mt-0 font-now">
                    <span class="cursor-pointer hover:text-white transition-colors">Política de Privacidade</span>
                    <span class="cursor-pointer hover:text-white transition-colors">Termos de Uso</span>
                </div>
            </div>
        </div>
    </footer>

    <a href="https://wa.me/5577981609526?text=Olá Letícia, vim pelo seu site!" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-xl hover:bg-green-600 transition-transform hover:scale-110 z-50 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">

    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true,
            offset: 80,
            duration: 900,
            easing: 'ease-out-cubic'
        });
    </script>
</body>
</html>
